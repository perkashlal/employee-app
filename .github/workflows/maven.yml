name: Java CI with Maven (No Sonar)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    # This provides the fixed port 27017 your ControllerIT expects
    services:
      mongodb:
        image: mongo:4.4.3
        ports:
          - 27017:27017

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Linux GUI Dependencies
      # Fixes the "HeadlessException" for Swing/AssertJ
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libgtk-3-0 libcanberra-gtk-module

    - name: Run All Tests (Unit -> IT -> E2E)
      
      run: xvfb-run mvn -B clean verify
